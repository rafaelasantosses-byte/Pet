// ── SERVICE WORKER — Cloudflare Pages Ready ───────────────────────────────
// Embutido como Blob (não precisa de arquivo sw.js separado)
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'pet-chique-v3';
const ASSETS = [
  './',
  './logo.png',
  'https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap'
];

// Instalação: cacheia arquivos essenciais
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE)
      .then(c => c.addAll(ASSETS).catch(() => {}))
      .then(() => self.skipWaiting())
  );
});

// Ativação: remove caches antigos
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys()
      .then(keys => Promise.all(
        keys.filter(k => k !== CACHE).map(k => caches.delete(k))
      ))
      .then(() => self.clients.claim())
  );
});

// Fetch: rede primeiro, cache como fallback offline
// NÃO intercepta Firebase, Firestore nem googleapis
self.addEventListener('fetch', e => {
  const url = e.request.url;
  if (
    url.includes('firestore.googleapis.com') ||
    url.includes('firebase') ||
    url.includes('identitytoolkit') ||
    url.includes('googleapis.com/identitytoolkit') ||
    url.includes('securetoken.googleapis.com') ||
    e.request.method !== 'GET'
  ) return;

  e.respondWith(
    fetch(e.request)
      .then(res => {
        if (res && res.status === 200) {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      })
      .catch(() => caches.match(e.request))
  );
});`;

  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl)
    .then(() => console.log('✅ Pet Chique PWA: instalável'))
    .catch(() => {});
}

// ── AUTH ───────────────────────────────────────────────────────────────────
function dismissLoading() {
  const el = document.getElementById('app-loading');
  if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }
}

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) {
      currentUserData = { uid: user.uid, ...snap.data() };
      startListeners();
      dismissLoading();
      renderApp();
    } else {
      await signOut(auth);
      dismissLoading();
      renderLogin();
    }
  } else {
    currentUser = null; currentUserData = null;
    unsubscribers.forEach(u => u());
    unsubscribers = [];
    dismissLoading();
    renderLogin();
  }
});

function startListeners() {
  unsubscribers.forEach(u => u());
  unsubscribers = [];
  const cols = ['products', 'clients', 'sales', 'fiados', 'cashSessions', 'users', 'logs'];
  cols.forEach(col => {
    const unsub = onSnapshot(collection(db, col), snap => {
      appData[col] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (activeTab) refreshTab();
    });
    unsubscribers.push(unsub);
  });
}

      const errEl = $('l-err-func');
      const btn = $('l-btn-func');

  [$('l-name-func'), $('l-pass-func')].forEach(el => el && (el.onkeydown = handleEnter('func')));

  bootstrapOwner();
}

function renderDashboard() {
  const today = new Date(); today.setHours(0,0,0,0);
  const todaySales = appData.sales.filter(s => !s.deleted && s.date?.toDate && s.date.toDate() >= today);
  const todayRev = todaySales.reduce((a,s) => a + (s.total||0), 0);
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
  const weekSales = appData.sales.filter(s => !s.deleted && s.date?.toDate && s.date.toDate() >= weekAgo);
  const weekRev = weekSales.reduce((a,s) => a + (s.total||0), 0);
  const monthAgo = new Date(); monthAgo.setDate(1); monthAgo.setHours(0,0,0,0);
  const monthSales = appData.sales.filter(s => !s.deleted && s.date?.toDate && s.date.toDate() >= monthAgo);
  const monthRev = monthSales.reduce((a,s) => a + (s.total||0), 0);
  const openCash = appData.cashSessions.find(c => !c.closed);
  const cashSales = openCash ? appData.sales.filter(s => s.cashSessionId === openCash.id && !s.deleted) : [];
  const cashTotal = cashSales.reduce((a,s) => a + (s.total||0), 0);
  const lowStock = appData.products.filter(p => (p.stock||0) < 5);
  // Últimas 6 vendas — mais informativas
  const recentSales = [...appData.sales].filter(s => !s.deleted)
    .sort((a,b) => (b.date?.seconds||0) - (a.date?.seconds||0)).slice(0,6);
  // Formas de pagamento do dia

// produto selecionado aguardando confirmação
let _pendingProductId = null;
// Variável que armazena a forma de pagamento selecionada (enviada ao banco ao finalizar)
window.forma_pagamento_selecionada = null;

window.setPayMethod = (method) => {
  // Armazena o método selecionado
  window.forma_pagamento_selecionada = method;
  window.currentPayMethod = method;

  // Reseta o estilo de TODOS os botões para inativo
  document.querySelectorAll('.pay-btn').forEach(btn => {
    const m = btn.dataset.method;
    if (m === 'fiado') {
      btn.style.background = '#1a1d23';
      btn.style.color = '#ff3b5c';
      btn.style.borderColor = '#ff3b5c66';
    } else {
      btn.style.background = '#1a1d23';
      btn.style.color = '#7ba7d4';
      btn.style.borderColor = '#1e2a3a';
    }
    btn.classList.remove('active');
  });

  // Aplica estilo ATIVO (Amarelo Ouro) no botão clicado
  const selectedBtn = document.getElementById('btn-pay-' + method);
  if (selectedBtn) {
    selectedBtn.style.background = '#f1c40f';
    selectedBtn.style.color = '#000';
    selectedBtn.style.borderColor = method === 'fiado' ? '#ff3b5c' : '#f1c40f';
    selectedBtn.classList.add('active');
  }

  // Atualiza disponibilidade do botão finalizar
  updateFinalizeBtn();
};
     
window.clearSelectedProduct = () => {
  _pendingProductId = null;
  const bar = $('selected-product-bar');
  if (bar) bar.style.display = 'none';
  // Oculta o dropdown e limpa o campo
  const list = $('prod-list');
  if (list) { list.style.display = 'none'; list.innerHTML = ''; }
  const bi = $('barcode-input'); if (bi) { bi.value = ''; bi.focus(); }
};

window.confirmAddToCart = () => {
  if (!_pendingProductId) return;
  const prod = appData.products.find(p => p.id === _pendingProductId);
  if (!prod) return;
  const qty = parseFloat($('add-qty')?.value) || 1;
  const price = parseFloat($('add-price')?.value);
  if (!price || price <= 0) { toast('Informe um preço válido.', 'error'); return; }
  const ex = cart.find(i => i.productId === _pendingProductId);
  if (ex) { ex.qty += qty; ex.price = price; }
  else cart.push({ productId: prod.id, name: prod.name, qty, price, unit: prod.unit, cost: prod.cost || 0 });
  renderCart();
  toast(`${prod.name} adicionado ✅`, 'success');
  clearSelectedProduct();
};

window.barcodeKeydown = (e) => {
  if (e.key === 'Enter') {
    const q = $('barcode-input').value.trim();
    const exact = appData.products.find(p => p.barcode && p.barcode === q);
    if (exact) { addToCart(exact.id); return; }
    filterProducts(q);
  }
  if (e.key === 'Escape') {
    const list = $('prod-list');
    if (list) { list.style.display = 'none'; list.innerHTML = ''; }
    const bi = $('barcode-input'); if (bi) bi.value = '';
  }
};

window.filterProducts = (q) => {
  const list = $('prod-list');
  if (!list) return;
  if (!q || q.trim() === '') {
    // Campo vazio: oculta o dropdown
    list.style.display = 'none';
    list.innerHTML = '';
    return;
  }
  const filtered = appData.products.filter(p =>
    p.name.toLowerCase().includes(q.toLowerCase()) ||
    p.category?.toLowerCase().includes(q.toLowerCase()) ||
    (p.barcode && p.barcode.includes(q)) ||
    (p.brand && p.brand.toLowerCase().includes(q.toLowerCase()))
  );
  list.innerHTML = renderProductList(filtered);
  list.style.display = 'block';
};

function renderProductList(prods) {
  if (!prods || prods.length === 0) return '<p style="padding:18px;text-align:center;color:#2a5298;font-size:13px">Nenhum produto encontrado.</p>';
  return prods.map(p => `
    <div onclick="addToCart('${p.id}')"
      style="display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid #140d00;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent"
      ontouchstart="this.style.background='#1a1200'" ontouchend="this.style.background=''"
      onmouseenter="this.style.background='#140d00'" onmouseleave="this.style.background=''">
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;color:#e8f0ff;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
        <div style="font-size:11px;color:#2a5298;margin-top:2px">${p.category || 'Geral'} • ${p.stock < 1 ? '<span style="color:#ff3b5c">Sem estoque</span>' : `<span style="color:#00d4aa">Estoque: ${p.stock}</span>`}</div>
      </div>
      <div style="text-align:right;margin-left:12px;flex-shrink:0">
        <div style="color:#D4AF37;font-weight:800;font-size:15px">${fmt(p.price)}</div>
      </div>
    </div>
  `).join('');
}

let cart = [];
let isFiado = false;
let payMethod = null; // Nenhum método pré-selecionado

window.addToCart = (pid) => {
  const prod = appData.products.find(p => p.id === pid);
  if (!prod) return;
  _pendingProductId = pid;

  // Fecha o dropdown e limpa o campo de busca
  const list = $('prod-list');
  if (list) { list.style.display = 'none'; list.innerHTML = ''; }
  const bi = $('barcode-input'); if (bi) bi.value = '';

  const bar = $('selected-product-bar');
  const nameEl = $('selected-prod-name');
  const priceEl = $('add-price');
  const qtyEl = $('add-qty');
  if (bar) bar.style.display = 'block';
  if (nameEl) nameEl.textContent = prod.name + (prod.stock < 1 ? ' ⚠️' : '');
  if (priceEl) { priceEl.value = prod.price; priceEl.focus(); }
  if (qtyEl) qtyEl.value = 1;
};



window.removeFromCart = (pid) => { cart = cart.filter(i => i.productId !== pid); renderCart(); };
window.setQty = (pid, v) => { const i = cart.find(x => x.productId === pid); if (i) i.qty = parseFloat(v) || 0; renderCart(); };
window.setPrice = (pid, v) => { const i = cart.find(x => x.productId === pid); if (i) i.price = parseFloat(v) || 0; renderCart(); };
window.setPdvMethod = (m) => {
  payMethod = m;
  window.forma_pagamento_selecionada = m;
  document.querySelectorAll('.pdv-pay-btn').forEach(b => b.classList.toggle('active', b.dataset.method === m));
  const fiadoDiv = $('pdv-fiado-name');
  if (fiadoDiv) fiadoDiv.style.display = m === 'fiado' ? 'block' : 'none';
  updateFinalizeBtn();
};
window.setPayMethod = window.setPayMethod || window.setPdvMethod; // legacy alias
window.onClientSelect = () => {};
window.toggleFiado = () => {};

function updateFinalizeBtn() {
  const btn = $('finalize-btn');
  if (!btn) return;
  const metodoPago = window.forma_pagamento_selecionada || payMethod;
  const ready = cart.length > 0 && !!metodoPago;
  btn.disabled = !ready;
  btn.style.opacity = ready ? '1' : '0.45';
  btn.style.cursor = ready ? 'pointer' : 'not-allowed';
}

function renderCart() {
  const ci = $('cart-items'); const ct = $('cart-total');
  if (!ci) return;
  if (cart.length === 0) { ci.innerHTML = '<p class="muted" style="font-size:13px">Clique nos produtos para adicionar</p>'; if (ct) ct.innerHTML = ''; return; }
  const total = cart.reduce((a,i) => a + i.qty * i.price, 0);
  const totalCost = cart.reduce((a,i) => a + i.qty * (i.cost || 0), 0);
  const isOwnerView = currentUserData?.name === 'Adriano Sampaio';
  ci.innerHTML = cart.map(item => `<div class="cart-item">
    <div style="flex:1;min-width:0">
      <div class="cart-name">${item.name}</div>
    </div>
    <input type="number" value="${item.qty}" min="0.1" step="0.1" class="input cart-qty" onchange="setQty('${item.productId}',this.value)"/>
    <span class="muted" style="font-size:11px">${item.unit}</span>
    <input type="number" value="${item.price}" step="0.01" class="input cart-price" onchange="setPrice('${item.productId}',this.value)"/>
    <span class="green bold" style="min-width:70px;text-align:right">${fmt(item.qty*item.price)}</span>
    <button class="btn-icon-danger" onclick="removeFromCart('${item.productId}')">✕</button>
  </div>`).join('');
  const lucro = total - totalCost;
  if (ct) ct.innerHTML = `<div class="cart-total-row">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
      <span class="muted small">${cart.length} item(ns)</span>
      <span>Total: <span class="green bold" style="font-size:20px">${fmt(total)}</span></span>
    </div>
    ${isOwnerView && totalCost > 0 ? `<div class="lucro-row"><span class="muted small">Custo total: ${fmt(totalCost)}</span><span class="lucro-badge">💹 Lucro Bruto: ${fmt(lucro)}</span></div>` : ''}
  </div>`;
  updateFinalizeBtn();
}

window.finalizeSale = async () => {
  if (cart.length === 0) { toast('Adicione ao menos um produto.', 'error'); return; }
  const metodoPago = window.forma_pagamento_selecionada || payMethod;
  if (!metodoPago) { toast('Por favor, selecione a forma de pagamento.', 'warning'); return; }
  const openCash = appData.cashSessions.find(c => !c.closed);
  if (!openCash) { toast('Abra o caixa antes de vender!', 'warning'); return; }

  const isFiadoMethod = metodoPago === 'fiado';
  // clientId vem do autocomplete; nome vem do campo de texto
  const clientId = window._selectedClientId || null;
  const clientObj = clientId ? appData.clients.find(c => c.id === clientId) : null;
  const nomeDigitado = ($('sale-client-name')?.value || '').trim();
  const clientName = clientObj?.name || nomeDigitado || 'Avulso';

  if (isFiadoMethod && !clientName) {
    toast('Para FIADO, informe o nome do cliente.', 'warning'); return;
  }

  const total = cart.reduce((a, i) => a + i.qty * i.price, 0);
  const note  = ($('sale-note')?.value || '').trim();
  const btn   = $('finalize-btn');
  if (btn) { btn.textContent = 'Salvando...'; btn.disabled = true; }

  try {
    const saleRef = await addDoc(collection(db, 'sales'), {
      items: cart, total,
      payMethod: metodoPago,
      clientName,
      clientId: clientId || null,
      note,
      date: serverTimestamp(),
      createdBy: currentUserData.name,
      deleted: false,
      cashSessionId: openCash.id
    });

    // Gera fiado para qualquer venda fiado — mesmo sem clientId cadastrado
    if (isFiadoMethod) {
      await addDoc(collection(db, 'fiados'), {
        clientId: clientId || null,
        clientName,
        items: cart,
        total,
        saleId: saleRef.id,
        date: serverTimestamp(),
        paid: false,
        createdBy: currentUserData.name
      });
    }

    // Baixa estoque
    for (const item of cart) {
      const prod = appData.products.find(p => p.id === item.productId);
      if (prod) {
        await updateDoc(doc(db, 'products', item.productId), {
          stock: Math.max(0, (prod.stock || 0) - item.qty)
        });
      }
    }

    cart = [];
    payMethod = null;
    window.forma_pagamento_selecionada = null;
    window._selectedClientId = null;
    toast(`Venda de ${fmt(total)} registrada! ✅`, 'success');
    activeTab = 'nova-venda';
    refreshTab();
  } catch (e) {
    console.error('Erro finalizeSale:', e);
    toast('Erro ao salvar venda: ' + e.message, 'error');
    if (btn) { btn.textContent = '✅ FINALIZAR VENDA'; btn.disabled = false; }
  }
};

// ── VENDAS ─────────────────────────────────────────────────────────────────
function renderSales() {
  const all = [...appData.sales]
    .sort((a,b) => (b.date?.seconds||0) - (a.date?.seconds||0));

  const ativas = all.filter(s => !s.deleted);
  const totais = {};
  ativas.forEach(s => {
    const m = s.payMethod || 'outros';
    totais[m] = (totais[m] || 0) + (s.total || 0);
  });
  const totalGeral = ativas.reduce((a,s) => a + (s.total||0), 0);

  const metodoCor = { dinheiro:'#00d4aa', debito:'#D4AF37', credito:'#c084fc', pix_qr:'#a78bfa', pix_transf:'#a78bfa', fiado:'#ff9f1c' };
  const metodoLabel = { dinheiro:'💵 Dinheiro', debito:'💳 Débito', credito:'💳 Crédito', pix_qr:'🖼️ Pix QR', pix_transf:'📲 Pix Transf.', fiado:'⚠️ Fiado' };

  const metodosUsados = Object.keys(totais);

  return `<div class="page">
    <div class="page-header"><h2>📋 Histórico de Vendas</h2></div>

    <!-- Resumo por forma de pagamento -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:18px">
      ${metodosUsados.map(m => {
        const cor = metodoCor[m] || '#7ba7d4';
        return `<div style="background:${cor}12;border:1px solid ${cor}44;border-radius:12px;padding:10px;text-align:center">
          <div style="font-size:10px;color:${cor};font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">${metodoLabel[m]||m}</div>
          <div style="font-size:16px;font-weight:800;color:${cor}">${fmt(totais[m])}</div>
        </div>`;
      }).join('')}
      <div style="background:#D4AF3714;border:1px solid #D4AF3744;border-radius:12px;padding:10px;text-align:center">
        <div style="font-size:10px;color:#D4AF37;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">🏆 Total Geral</div>
        <div style="font-size:16px;font-weight:800;color:#D4AF37">${fmt(totalGeral)}</div>
      </div>
    </div>

    <div class="list-container">
      ${all.length ? all.map(s => {
        const cor = metodoCor[s.payMethod] || '#7ba7d4';
        const label = metodoLabel[s.payMethod] || s.payMethod || '';
        return `<div class="sale-row ${s.deleted?'deleted':''}">
          <div class="sale-info">
            <div class="sale-header">
              <span class="bold">${s.clientName||'Avulso'}</span>
              ${s.deleted ? '<span class="badge red">CANCELADA</span>' : `<span style="background:${cor}18;border:1px solid ${cor}44;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700;color:${cor}">${label}</span>`}
            </div>
            <div class="sale-meta">${fmtDate(s.date)} · por ${s.createdBy||'—'}</div>
            ${s.deleted ? `<div class="sale-cancel">❌ ${s.deletedBy}: ${s.deleteReason}</div>` : ''}
            ${s.note ? `<div class="sale-note">📝 ${s.note}</div>` : ''}

}

window.cancelSale = (id) => {

window.confirmCancel = async (id) => {
  const reason = $('cancel-reason')?.value;
  if (!reason) { toast('Informe o motivo.', 'error'); return; }
  const sale = appData.sales.find(s => s.id === id);
  await updateDoc(doc(db, 'sales', id), { deleted: true, deleteReason: reason, deletedBy: currentUserData.name, deletedAt: serverTimestamp() });
  await auditLog('Cancelar Venda', fmt(sale?.total||0), 'CANCELADA', { motivo: reason, venda: id });
  closeModal(); toast('Venda cancelada (registro mantido).', 'warning');
};

window.addPagtoAtalho = (v) => {

window.toggleClientSection = (show, hide) => {
  const s = $(show); const h = $(hide);

  const isOpen = s.style.display !== 'none';
  if (s) s.style.display = isOpen ? 'none' : 'block';

};

window.preencherTodoDébito = (total) => {
  const el = $('c-pagto-val'); if (el) el.value = total;
};

window.salvarDebitoCliente = async (clientId, clientName, debitoAtual) => {
  const val = parseFloat($('c-debito-val')?.value);
  const desc = $('c-debito-desc')?.value?.trim() || 'Débito manual';
  if (!val || val <= 0) { toast('Informe um valor válido.', 'error'); return; }
  await addDoc(collection(db, 'fiados'), {
    clientId, clientName, total: val,
    items: [{ name: desc, qty: 1, price: val }],
    date: serverTimestamp(), paid: false, createdBy: currentUserData.name
  });
  await auditLog('Débito Manual', fmt(debitoAtual), fmt(debitoAtual + val), { clientName, descricao: desc });
  closeModal();
  toast(`Débito de ${fmt(val)} adicionado para ${clientName}`, 'warning');
};

window.salvarPagtoCliente = async (clientId, clientName) => {
  // Recalcula o débito real ao vivo — nunca usa parâmetro stale
  const pendentes = appData.fiados.filter(f => f.clientId === clientId && !f.paid)
    .sort((a,b) => (a.date?.seconds||0) - (b.date?.seconds||0));
  const debitoReal = pendentes.reduce((a,f) => a + (f.total||0), 0);

  const val = parseFloat($('c-pagto-val')?.value);
  if (!val || val <= 0) { toast('Informe um valor válido.', 'error'); return; }
  if (val > debitoReal + 0.01) { toast(`Valor maior que o débito atual (${fmt(debitoReal)}).`, 'error'); return; }

  let restante = val;
  for (const f of pendentes) {
    if (restante <= 0.005) break;
    if (f.total <= restante + 0.005) {
      await updateDoc(doc(db, 'fiados', f.id), { paid: true, paidAt: serverTimestamp(), paidBy: currentUserData.name });
      restante = parseFloat((restante - f.total).toFixed(2));
    } else {
      await updateDoc(doc(db, 'fiados', f.id), { total: parseFloat((f.total - restante).toFixed(2)) });
      restante = 0;
    }
  }
  await auditLog('Pagamento Direto', fmt(debitoReal), fmt(Math.max(0, debitoReal - val)), { clientName });
  closeModal();
  toast(`Pagamento de ${fmt(val)} registrado para ${clientName} ✅`, 'success');
};

window.saveClient = async (id) => {
  const name = $('c-name')?.value?.trim();
  if (!name) { toast('Nome é obrigatório.', 'error'); return; }
  const data = { name, phone: $('c-phone')?.value||'', address: $('c-address')?.value||'' };
  if (id) {
    await updateDoc(doc(db, 'clients', id), data);
    closeModal(); toast('Cliente atualizado!', 'success');
  } else {
    const newDoc = await addDoc(collection(db, 'clients'), { ...data, createdAt: serverTimestamp() });
    const debitoInicial = parseFloat($('c-debito-inicial')?.value);
    if (debitoInicial > 0) {
      const desc = $('c-debito-inicial-desc')?.value?.trim() || 'Saldo inicial';

window.confirmarAjuste = async (clientId, clientName) => {
  // Sempre recalcula ao vivo — nunca confia em parâmetro passado do HTML
  const pendentes = appData.fiados.filter(f => f.clientId === clientId && !f.paid)
    .sort((a, b) => (a.date?.seconds || 0) - (b.date?.seconds || 0));
  const debitoReal = pendentes.reduce((a, f) => a + (f.total || 0), 0);

  const tipo = window._tipoAjuste || 'debito';
  const desc = $('ajuste-desc')?.value?.trim();
  let val = parseFloat($('ajuste-val')?.value);

  if (tipo === 'quitar') {
    if (!pendentes.length) { toast('Nenhum débito pendente.', 'warning'); return; }
    // Confirma antes de quitar tudo
    const ok = confirm(`Confirma quitação total de ${fmt(debitoReal)} para ${clientName}?`);
    if (!ok) return;
    for (const f of pendentes) {
      await updateDoc(doc(db, 'fiados', f.id), { paid: true, paidAt: serverTimestamp(), paidBy: currentUserData.name });
    }
    await auditLog('Ajuste Manual — Quitar Tudo', fmt(debitoReal), 'R$ 0,00', { clientName, motivo: desc || 'Quitação manual' });
    closeModal();
    toast(`Débito de ${clientName} quitado! ✅`, 'success');
    return;
  }

  if (!val || val <= 0) { toast('Informe um valor válido.', 'error'); return; }
  if (!desc) { toast('Informe o motivo.', 'error'); return; }

  if (tipo === 'debito') {
    await addDoc(collection(db, 'fiados'), {
      clientId, clientName,
      items: [{ name: desc, qty: 1, price: val }],
      total: val, date: serverTimestamp(), paid: false,
      createdBy: currentUserData.name, isManual: true
    });
    await auditLog('Ajuste Manual — Débito', fmt(debitoReal), fmt(debitoReal + val), { clientName, descricao: desc });
    toast(`Débito de ${fmt(val)} adicionado para ${clientName}`, 'warning');
  } else {
    // Crédito parcial — quita do mais antigo ao mais novo
    if (val > debitoReal + 0.01) { toast(`Valor maior que o débito atual (${fmt(debitoReal)}).`, 'error'); return; }
    let restante = val;
    for (const f of pendentes) {
      if (restante <= 0.005) break;
      if (f.total <= restante + 0.005) {
        await updateDoc(doc(db, 'fiados', f.id), { paid: true, paidAt: serverTimestamp(), paidBy: currentUserData.name });
        restante = parseFloat((restante - f.total).toFixed(2));
      } else {
        await updateDoc(doc(db, 'fiados', f.id), { total: parseFloat((f.total - restante).toFixed(2)) });
        restante = 0;
      }
    }
    await auditLog('Ajuste Manual — Crédito', fmt(debitoReal), fmt(Math.max(0, debitoReal - val)), { clientName, descricao: desc });
    toast(`Crédito de ${fmt(val)} aplicado para ${clientName}`, 'success');
  }
  closeModal();
};

window.confirmarPagtoFiado = async (clientId, clientName, _totalIgnorado, _idsIgnorados) => {
  // SEMPRE recalcula ao vivo — ignora parâmetros stale
  const pendentes = appData.fiados
    .filter(f => !f.paid && (f.clientId === clientId || (!clientId && f.clientName === clientName)))
    .sort((a, b) => (a.date?.seconds || 0) - (b.date?.seconds || 0));

  const totalDevedor = pendentes.reduce((a, f) => a + (f.total || 0), 0);
  const pago = parseFloat($('pagto-val')?.value);

  if (!pago || pago <= 0) { toast('Informe o valor recebido.', 'error'); return; }
  if (pago > totalDevedor + 0.005) { toast(`Valor maior que o débito (${fmt(totalDevedor)}).`, 'error'); return; }

  let restante = Math.round(pago * 100); // trabalha em centavos para evitar float bugs
  for (const f of pendentes) {
    if (restante <= 0) break;
    const fCents = Math.round((f.total || 0) * 100);
    if (fCents <= restante) {
      await updateDoc(doc(db, 'fiados', f.id), {
        paid: true, paidAt: serverTimestamp(), paidBy: currentUserData.name
      });
      restante -= fCents;
    } else {
      const novoTotal = parseFloat(((fCents - restante) / 100).toFixed(2));
      await updateDoc(doc(db, 'fiados', f.id), { total: novoTotal });
      restante = 0;
    }
  }

  await auditLog('Pagamento Fiado', fmt(totalDevedor), fmt(Math.max(0, totalDevedor - pago)), { clientName, valorPago: fmt(pago) });
  closeModal();
  const novoSaldo = parseFloat((totalDevedor - pago).toFixed(2));
  toast(novoSaldo > 0.01
    ? `Pagamento de ${fmt(pago)} registrado. Saldo restante: ${fmt(novoSaldo)} ⚠️`
    : `Fiado de ${clientName} quitado! ✅`,
    novoSaldo > 0.01 ? 'warning' : 'success');
};

window.saveProduct = async (id) => {
  const name = $('p-name')?.value?.trim();
  const price = parseFloat($('p-price')?.value);
  if (!name || !price) { toast('Preencha nome e preço.', 'error'); return; }
  const data = {
    name, price,
    cost: parseFloat($('p-cost')?.value) || 0,
    stock: parseFloat($('p-stock')?.value) || 0,
    unit: $('p-unit')?.value || 'un',
    category: $('p-cat')?.value || 'Outro',
    brand: $('p-brand')?.value || '',
    barcode: $('p-barcode')?.value || ''
  };
  if (id) {
    const old = appData.products.find(p => p.id === id);
    await updateDoc(doc(db, 'products', id), data);
    await auditLog('Editar Produto', `${old?.name} R$${old?.price}`, `${name} R$${price}`, { produto: name });
  } else {
    await addDoc(collection(db, 'products'), { ...data, createdAt: serverTimestamp() });
    await auditLog('Novo Produto', '—', `${name} R$${price}`, { produto: name });
  }
  closeModal(); toast(id ? 'Produto atualizado!' : 'Produto cadastrado!', 'success');
};

window.deleteProduct = async (id) => {
  if (currentUserData?.name !== 'Adriano Sampaio') { toast('Apenas o proprietário pode apagar produtos.', 'error'); return; }
  if (!confirm('Remover este produto?')) return;
  await deleteDoc(doc(db, 'products', id));
  toast('Produto removido.', 'warning');
};

  else if (period==='week') start.setDate(start.getDate()-7);
  else if (period==='month') start.setDate(1);
  else start.setMonth(0,1);

  const allSales = appData.sales.filter(s => !s.deleted && s.date?.toDate && s.date.toDate() >= start);
  const salesReais = allSales.filter(s => s.payMethod !== 'fiado');
  const salesFiado = allSales.filter(s => s.payMethod === 'fiado');

  // Fiados criados no período (via coleção fiados)
  const fiadosPeriodo = appData.fiados.filter(f => f.date?.toDate && f.date.toDate() >= start);

  const topProds = {}; allSales.forEach(s=>(s.items||[]).forEach(i=>{ topProds[i.name]=(topProds[i.name]||0)+i.qty*i.price; }));
  const top = Object.entries(topProds).sort((a,b)=>b[1]-a[1]).slice(0,5);

window.openEmailReport = function() {
  var period = window._reportPeriod || 'week';
  var now = new Date();
  var startD = new Date();
  if (period==='day') startD.setHours(0,0,0,0);
  else if (period==='week') startD.setDate(startD.getDate()-7);
  else if (period==='month') startD.setDate(1);
  else startD.setMonth(0,1);
  var sales = appData.sales.filter(function(s){ return !s.deleted && s.date?.toDate && s.date.toDate() >= startD; });
  var totalSales = appData.sales.filter(function(s){ return !s.deleted; });
  var total = sales.reduce(function(a,s){ return a+(s.total||0); }, 0);
  var totalGeral = totalSales.reduce(function(a,s){ return a+(s.total||0); }, 0);
  var pending = appData.fiados.filter(function(f){ return !f.paid; });
  var totalF = pending.reduce(function(a,f){ return a+(f.total||0); }, 0);
  var byMethod = {};
  sales.forEach(function(s){ byMethod[s.payMethod]=(byMethod[s.payMethod]||0)+(s.total||0); });
  var topProds = {};
  sales.forEach(function(s){ (s.items||[]).forEach(function(i){ topProds[i.name]=(topProds[i.name]||0)+i.qty*i.price; }); });
  var top = Object.entries(topProds).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var labels = {day:'Hoje',week:'Últimos 7 dias',month:'Este mês',year:'Este ano'};
  var periodLabel = labels[period] || '7 dias';
  var ticketMedio = sales.length ? (total/sales.length).toFixed(2) : '0.00';
  var dataHoje = now.toLocaleDateString('pt-BR');
  var payLines = Object.entries(byMethod).map(function(x){ return '   💳 ' + x[0] + ': R$ ' + x[1].toFixed(2); }).join('\n') || '   Sem vendas no período';
  var topLines = top.length ? top.map(function(x,i){ return '   ' + ['🥇','🥈','🥉','4️⃣','5️⃣'][i] + ' ' + x[0] + ': R$ ' + x[1].toFixed(2); }).join('\n') : '   Sem dados';
  var canceladas = appData.sales.filter(function(s){ return s.deleted && s.date?.toDate && s.date.toDate() >= startD; });
  var openCash = appData.cashSessions.find(function(c){ return !c.closed; });
  var msg = '📊 *Relatório de Vendas PET CHIQUE*\n'
    + '📅 ' + periodLabel + ' | ' + dataHoje + '\n'
    + '━━━━━━━━━━━━━━━━━━\n\n'
    + '💰 *RESUMO FINANCEIRO*\n'
    + '   ✅ Vendas do período: *R$ ' + total.toFixed(2) + '*\n'
    + '   🛒 Número de vendas: ' + sales.length + '\n'
    + '   🎯 Ticket médio: R$ ' + ticketMedio + '\n'
    + '   ⚠️ Fiados em aberto: *R$ ' + totalF.toFixed(2) + '* (' + pending.length + ' cliente(s))\n'
    + '   💳 Caixa: ' + (openCash ? 'ABERTO 🟢' : 'FECHADO 🔴') + '\n\n'
    + '💳 *FORMAS DE PAGAMENTO*\n' + payLines + '\n\n'
    + '🏆 *TOP PRODUTOS*\n' + topLines + '\n\n'
    + (canceladas.length ? '❌ *CANCELADAS NO PERÍODO:* ' + canceladas.length + '\n\n' : '')
    + '━━━━━━━━━━━━━━━━━━\n'
    + '👑 *Pet Chique — Adriano Sampaio*\n'
    + '_Sistema de Gestão_';
  window._wppMsg = msg;
  var html = '<div class="modal-body">';
  html += '<h3>🟢 Relatório via WhatsApp</h3>';
  html += '<p class="muted" style="margin-bottom:12px">Relatório formatado com 📊 para envio automático.</p>';
  html += '<div style="background:#25d36615;border:1px solid #25d36633;border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;color:#25d366;white-space:pre-line;max-height:180px;overflow-y:auto">' + msg + '</div>';
  html += '<div class="form-group"><label>Número WhatsApp com DDD</label>';
  html += '<input id="wpp-number" class="input" type="tel" placeholder="85999001122"/>';
  html += '<p class="muted small" style="margin-top:4px">Ex: 85999001122 (deixe vazio para escolher na hora)</p></div>';
  html += '<div class="modal-actions">';
  html += '<button class="btn-secondary" onclick="closeModal()">Cancelar</button>';
  html += '<button class="btn-success" onclick="sendWhatsApp()">🟢 Abrir WhatsApp</button>';
  html += '</div></div>';
  showModal(html);
};

window.sendWhatsApp = function() {
  var numEl = document.getElementById('wpp-number');

  var msg = window._wppMsg || '📊 Relatório PET CHIQUE';
  var url = num
    ? 'https://wa.me/55' + num + '?text=' + encodeURIComponent(msg)
    : 'https://wa.me/?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
  closeModal();
  toast('WhatsApp aberto! ✅', 'success');
};

window.createEmployee = async () => {
  const name = $('emp-name')?.value?.trim();
  const email = $('emp-email')?.value?.trim();
  const pass = $('emp-pass')?.value;
  if (!name || !email || !pass) { toast('Preencha todos os campos.', 'error'); return; }
  if (pass.length < 6) { toast('Senha mínimo 6 caracteres.', 'error'); return; }
  try {
    // Save current user to restore session
    const ownerEmail = currentUser.email;
    const { createUserWithEmailAndPassword: createUser } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const cred = await createUser(auth, email, pass);
    await setDoc(doc(db, 'users', cred.user.uid), { name, email, role: 'user', createdAt: serverTimestamp() });
    await auditLog('Cadastrar Funcionário', '—', name, { email });
    // Sign back in as owner
    await signOut(auth);
    toast('Funcionário cadastrado! Faça login novamente.', 'success');
    renderLogin();
  } catch(e) {
    toast('Erro: ' + (e.code === 'auth/email-already-in-use' ? 'E-mail já cadastrado.' : e.message), 'error');
  }
};
